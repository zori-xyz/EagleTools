services:
  postgres:
    image: postgres:16-alpine
    container_name: eagletools_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eagletools}
      POSTGRES_USER: ${POSTGRES_USER:-eagletools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eagletools_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eagletools_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  web:
    build: .
    container_name: eagletools_web
    command: uvicorn app.web.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    ports:
      - "8000:8000"

  bot:
    build: .
    container_name: eagletools_bot
    command: python -m app.bot.main
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build: .
    container_name: eagletools_worker
    command: arq app.infra.queue.arq.WorkerSettings
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  app_data: