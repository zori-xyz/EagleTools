services:
  postgres:
    image: postgres:16-alpine
    container_name: eagletools_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eagletools}
      POSTGRES_USER: ${POSTGRES_USER:-eagletools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eagletools_pass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: eagletools_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  pg_data:
  redis_data: